<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - XT Shipping</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/maritime-theme.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="{{ url_for('static', filename='images/xt-logo.jpg') }}" alt="XT Group Logo" class="login-logo-img">
            </div>
            
            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Enter your username" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your password" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
        </div>
        
        <div class="login-footer">
            <p>&copy; 2025 XT Group - A legacy of excellence since 1956</p>
            <p class="tagline">Service • Safety • Efficiency</p>
        </div>
    </div>
</body>
</html>
